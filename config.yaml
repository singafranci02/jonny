# ============================================================
# Jarvis configuration — swap models/providers here, not in code
# ============================================================

llm:
  # How many past user/assistant turns to keep in the prompt
  # (smaller = faster local prefill; memory recalls older facts anyway)
  max_history_turns: 10

  # Hybrid brain: each tier picks its own provider + model.
  # provider: ollama (local, free, private) | anthropic | openai_compatible
  tiers:
    # Everyday voice turns: Haiku = answers start in ~1-2s (~$2-4/month at
    # heavy use). If the cloud is unreachable this degrades automatically to
    # the free local model below. For $0-but-slower (~5-9s), swap this tier
    # back to: provider: ollama, model: qwen3:8b.
    # (Don't use qwen3:4b — broken no-think in Ollama, rambles out loud.)
    default:
      provider: anthropic
      model: claude-haiku-4-5
      max_tokens: 300
    # Free local fallback used automatically when the cloud tier errors
    fallback_local:
      provider: ollama
      model: qwen3:8b
      max_tokens: 512
    # Hard turns (code, multi-step analysis): Claude Sonnet 5
    hard:
      provider: anthropic
      model: claude-sonnet-5
      thinking: adaptive
      effort: high
      max_tokens: 2048
    # Deep-research synthesis (cited reports)
    research:
      provider: anthropic
      model: claude-sonnet-5
      thinking: adaptive
      effort: high
      max_tokens: 4096
    # Research page-note distillation: local, free
    summarize:
      provider: ollama
      model: qwen3:8b
      max_tokens: 700

  ollama:
    url: http://localhost:11434
    keep_alive: -1          # never unload: cold model load costs ~30s on 16GB

  # USD per 1M tokens (Sonnet 5 intro pricing through 2026-08-31,
  # then 3.00 / 15.00; cache write = 1.25x input, cache read = 0.1x)
  pricing:
    claude-sonnet-5:  { input: 2.00, output: 10.00, cache_write: 2.50, cache_read: 0.20 }
    claude-haiku-4-5: { input: 1.00, output: 5.00,  cache_write: 1.25, cache_read: 0.10 }

  # Escape hatch: point any tier at an OpenAI-style endpoint
  # (DeepSeek, Qwen cloud, Kimi, GLM...). Text-only, no tool calling.
  openai_compatible:
    base_url: https://api.deepseek.com
    api_key_env: LLM_API_KEY
    pricing: {}   # fill in if you want cost logging on this provider

routing:
  # A turn is routed to the "hard" model if it matches any of these.
  min_words_hard: 80
  hard_keywords:
    - code
    - script
    - function
    - refactor
    - debug
    - regex
    - sql
    - analyze
    - analysis
    - compare
    - plan out
    - step by step
    - architecture
    - spreadsheet
    - calculate

research:
  results_per_query: 3      # search hits considered per sub-query
  pages_per_query: 2        # pages actually read per sub-query

turn:
  # if you pause mid-thought it waits this long for you to continue before
  # answering what it has (raise if it still jumps in; lower if it lags)
  continuation_timeout: 1.2

profile:
  file: data/profile.md     # your hand-edited "About Me" (gitignored, private)

server:
  port: 8765
  # token that the web app must send to reach this Mac. Set JARVIS_TOKEN in .env
  # to any long random string, and set the same value in Vercel.

wakeword:
  enabled: true             # require the phrase before responding (voice mode)
  phrase: hey jarvis
  aliases: [jarvis, hey travis, hey jervis]   # common mis-transcriptions
  active_window: 60         # seconds after an exchange where no phrase is needed

persona:
  name: Jarvis
  # Keep this file byte-stable: it is the cached prompt prefix.
  system_prompt_file: prompts/system.md

stt:
  engine: realtime_stt
  model: large-v3-turbo     # faster-whisper model for `make voice`
  # web/voice-server model. small.en (~1.2s) gets your names right with the
  # vocabulary bias below; bump to medium.en for flawless-but-3x-slower.
  web_model: small.en
  language: en              # "" for auto-detect
  device: cpu               # ctranslate2 has no Metal backend; cpu + int8 is the Apple Silicon path
  compute_type: int8
  beam_size: 5              # higher = more accurate (small model, still fast)
  # proper nouns Whisper otherwise mangles ("Mareluna" -> "marijuana"). Names
  # from your About-Me profile are added automatically; add more here.
  vocabulary: "Mareluna, Giulia, Ligurian, Jarvis, Jonny"
  min_avg_logprob: -1.0     # below this = probably misheard → ask to repeat
  max_no_speech: 0.6        # above this = probably wasn't real speech
  silence_duration: 0.7     # seconds of silence that end an utterance (raise if it cuts you off)
  initial_prompt: "Hey Jarvis."   # biases Whisper toward hearing the wake phrase
  input_device_index: null  # null = system default mic; `make mic-test` lists devices

tts:
  engine: kokoro            # kokoro | say (auto-falls back to say on failure)
  voice: bm_george          # deep British male. Others: bm_fable, bm_daniel,
                            # bm_lewis / American: am_onyx, am_michael...
  speed: 1.1                # >1 = brisker delivery
  lang_code: b              # 'b' = British English, 'a' = American
  device: ""                # cpu: kokoro on MPS fights qwen for the GPU
  # spoken instantly when the real answer takes longer than ack_after seconds
  acks: ["One sec.", "Hmm, let me think.", "On it.", "Right, give me a moment."]
  ack_after: 0.9
  # spoken when it can't make out what you said (instead of guessing)
  reprompts: ["Sorry, I didn't catch that.", "Come again?", "Say that once more?"]
  say_voice: ""             # macOS say fallback; "" = system default
  say_rate: 190

memory:
  backend: mem0             # mem0 | none
  user_id: francesco
  top_k: 3                  # memories injected per turn (smaller = faster local prefill)
  min_score: 0.45           # relevance floor: weak matches are worse than none
  extraction_llm: claude-haiku-4-5   # cheap model that distills facts after each turn
  embed_model: nomic-embed-text      # local via Ollama, free
  ollama_url: http://localhost:11434
  data_dir: data/mem0

knowledge:
  backend: chroma           # chroma | none
  folder: knowledge         # drop .md/.txt/.pdf files here
  top_k: 3                  # chunks injected per turn (smaller = faster local prefill)
  max_distance: 0.52        # cosine distance cutoff; higher = looser matching
                            # (strict on purpose: irrelevant chunks derail answers)
  chunk_size: 1500          # chars per chunk
  chunk_overlap: 200
  embed_model: nomic-embed-text
  ollama_url: http://localhost:11434
  data_dir: data/knowledge
  watch: true               # re-index automatically when files change
