# ============================================================
# Jarvis configuration — swap models/providers here, not in code
# ============================================================

llm:
  # How many past user/assistant turns to keep in the prompt
  max_history_turns: 20

  # Hybrid brain: each tier picks its own provider + model.
  # provider: ollama (local, free, private) | anthropic | openai_compatible
  tiers:
    # Everyday voice turns: local qwen3, $0
    default:
      provider: ollama
      model: qwen3:8b
      max_tokens: 512
    # Hard turns (code, multi-step analysis): Claude Sonnet 5
    hard:
      provider: anthropic
      model: claude-sonnet-5
      thinking: adaptive
      effort: high
      max_tokens: 2048
    # Deep-research synthesis (cited reports)
    research:
      provider: anthropic
      model: claude-sonnet-5
      thinking: adaptive
      effort: high
      max_tokens: 4096
    # Research page-note distillation: local, free
    summarize:
      provider: ollama
      model: qwen3:8b
      max_tokens: 700

  ollama:
    url: http://localhost:11434
    keep_alive: 30m         # keep the local model resident between turns

  # USD per 1M tokens (Sonnet 5 intro pricing through 2026-08-31,
  # then 3.00 / 15.00; cache write = 1.25x input, cache read = 0.1x)
  pricing:
    claude-sonnet-5:  { input: 2.00, output: 10.00, cache_write: 2.50, cache_read: 0.20 }
    claude-haiku-4-5: { input: 1.00, output: 5.00,  cache_write: 1.25, cache_read: 0.10 }

  # Escape hatch: point any tier at an OpenAI-style endpoint
  # (DeepSeek, Qwen cloud, Kimi, GLM...). Text-only, no tool calling.
  openai_compatible:
    base_url: https://api.deepseek.com
    api_key_env: LLM_API_KEY
    pricing: {}   # fill in if you want cost logging on this provider

routing:
  # A turn is routed to the "hard" model if it matches any of these.
  min_words_hard: 80
  hard_keywords:
    - code
    - script
    - function
    - refactor
    - debug
    - regex
    - sql
    - analyze
    - analysis
    - compare
    - plan out
    - step by step
    - architecture
    - spreadsheet
    - calculate

research:
  results_per_query: 3      # search hits considered per sub-query
  pages_per_query: 2        # pages actually read per sub-query

wakeword:
  enabled: true             # require the phrase before responding (voice mode)
  phrase: hey jarvis
  aliases: [jarvis, hey travis, hey jervis]   # common mis-transcriptions
  active_window: 60         # seconds after an exchange where no phrase is needed

persona:
  name: Jarvis
  # Keep this file byte-stable: it is the cached prompt prefix.
  system_prompt_file: prompts/system.md

stt:
  engine: realtime_stt
  model: large-v3-turbo     # faster-whisper model; try "small.en" if too slow
  language: en              # "" for auto-detect
  device: cpu               # ctranslate2 has no Metal backend; cpu + int8 is the Apple Silicon path
  compute_type: int8
  silence_duration: 0.8     # seconds of silence that end an utterance

tts:
  engine: kokoro            # kokoro | say (auto-falls back to say on failure)
  voice: af_heart           # kokoro voice
  speed: 1.0
  lang_code: a              # 'a' = American English
  say_voice: ""             # macOS say fallback; "" = system default
  say_rate: 190

memory:
  backend: mem0             # mem0 | none
  user_id: francesco
  top_k: 5                  # memories injected per turn
  extraction_llm: claude-haiku-4-5   # cheap model that distills facts after each turn
  embed_model: nomic-embed-text      # local via Ollama, free
  ollama_url: http://localhost:11434
  data_dir: data/mem0

knowledge:
  backend: chroma           # chroma | none
  folder: knowledge         # drop .md/.txt/.pdf files here
  top_k: 4                  # chunks injected per turn
  max_distance: 0.75        # cosine distance cutoff; higher = looser matching
  chunk_size: 1500          # chars per chunk
  chunk_overlap: 200
  embed_model: nomic-embed-text
  ollama_url: http://localhost:11434
  data_dir: data/knowledge
  watch: true               # re-index automatically when files change
